<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Scanner Options</title>
    <link rel="stylesheet" href="/src/ui/tokens.css" />
    <link rel="stylesheet" href="/src/ui/components.css" />
    <link rel="stylesheet" href="/src/options/options.css" />
  </head>
  <body>
    <main class="options-page">
      <header class="options-page__header">
        <h1>AI Scanner</h1>
        <p class="options-page__lead">Configure API connection and analysis behavior.</p>
      </header>

      <form class="options-form" id="optionsForm">
        <label class="field" for="apiBaseUrl">
          <span class="field__label">API Base URL</span>
          <input id="apiBaseUrl" type="url" autocomplete="url" />
          <span class="field__hint">Must match a host permission in the manifest.</span>
        </label>

        <label class="field" for="apiKey">
          <span class="field__label">API Key</span>
          <input id="apiKey" type="password" autocomplete="off" />
          <span class="field__hint">Required when the API enforces keys.</span>
        </label>

        <label class="field" for="enableAnalysis">
          <span class="field__label">Enable Analysis</span>
          <select id="enableAnalysis">
            <option value="true">Enabled</option>
            <option value="false">Disabled</option>
          </select>
        </label>

        <label class="field" for="maxGalleryImages">
          <span class="field__label">Max Gallery Images</span>
          <input id="maxGalleryImages" type="number" min="0" max="24" />
          <span class="field__hint">Gallery URLs sent for OCR when DOM is incomplete.</span>
        </label>

        <label class="field" for="analysisMode">
          <span class="field__label">Analysis Mode</span>
          <select id="analysisMode">
            <option value="DOM_AND_VISION">DOM + Vision</option>
            <option value="DOM_ONLY">DOM Only</option>
          </select>
        </label>

        <label class="field" for="forceRefresh">
          <span class="field__label">Force Refresh</span>
          <select id="forceRefresh">
            <option value="false">No</option>
            <option value="true">Yes — next analyze skips cache</option>
          </select>
        </label>

        <details class="options-advanced">
          <summary>Personalization</summary>
          <div class="options-advanced__body">
            <label class="check"><input type="checkbox" id="prefVegan" /> Vegan</label>
            <label class="check"><input type="checkbox" id="prefVegetarian" /> Vegetarian</label>
            <label class="check"><input type="checkbox" id="prefPregnancy" /> Pregnancy</label>
            <label class="check"><input type="checkbox" id="prefNutAllergy" /> Nut allergy</label>
            <label class="check"><input type="checkbox" id="prefDairyAllergy" /> Dairy allergy</label>
            <label class="check"><input type="checkbox" id="prefSensitiveSkin" /> Sensitive skin</label>
            <label class="check"><input type="checkbox" id="prefFragranceSensitivity" /> Fragrance sensitivity</label>
          </div>
        </details>

        <button id="save" type="button" class="btn btn--primary">Save</button>
        <p id="msg" class="save-msg" aria-live="polite"></p>
      </form>

      <footer class="options-page__footer">
        <a id="privacyPolicyLink" href="#" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
      </footer>
    </main>
    <script type="module" src="/src/options/options.ts"></script>
  </body>
</html>
