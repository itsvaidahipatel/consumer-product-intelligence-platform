<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Scanner</title>
  </head>
  <body>
    <main class="shell">
      <p class="panel-hint">
        Open a supported product page, then tap <strong>Analyze Product</strong>.
      </p>
      <div class="button-row">
        <button id="analyze" type="button" class="primary">Analyze Product</button>

      </div>
      <div id="status" class="status" hidden></div>
      <div id="results" class="results" hidden></div>
      <p class="panel-footer">
        <a id="privacyPolicyFooter" href="#" target="_blank" rel="noopener noreferrer">Privacy policy</a>
      </p>
    </main>
    <script type="module" src="/src/sidepanel.ts"></script>
