name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @ingredient-scanner/shared build

      - name: API tests
        run: pnpm --filter @ingredient-scanner/api test

      - name: Shared tests
        run: pnpm --filter @ingredient-scanner/shared test

      - name: Build extension
        run: pnpm --filter @ingredient-scanner/extension build

      - name: Build API
        run: pnpm --filter @ingredient-scanner/api build

      - name: Eval smoke
        run: pnpm eval:run
